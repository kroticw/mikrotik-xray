name: Update RU geo list

# Regenerate routeros/ru-geo.rsc from ipdeny and commit it when it changes.
# The router fetches the committed file and imports it on its own schedule
# (see routeros/03-geo-split.rsc), so this keeps the RU bypass list fresh
# without any on-router parsing.

on:
  schedule:
    - cron: "17 3 * * 1"   # weekly, Monday 03:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-ru-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate ru-geo.rsc from ipdeny
        run: ./scripts/gen-ru-list.sh routeros/ru-geo.rsc

      - name: Commit if changed
        run: |
          if git diff --quiet -- routeros/ru-geo.rsc; then
            echo "ru-geo.rsc unchanged, nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add routeros/ru-geo.rsc
          git commit --message "chore(geo): refresh RU address-list from ipdeny"
          git push
